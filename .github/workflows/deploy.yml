name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

# 同一ブランチへの連続 push 時は最新のみ実行する
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # Workload Identity Federation に必要

    env:
      SERVICE: kakeibo-api
      REGION: asia-northeast1
      # Artifact Registry のイメージパス
      # 事前に `gcloud artifacts repositories create kakeibo --repository-format=docker --location=asia-northeast1` で作成しておくこと
      IMAGE: asia-northeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/kakeibo/kakeibo-api

    steps:
      - uses: actions/checkout@v4

      # Workload Identity Federation で認証
      # 必要な GitHub Secrets:
      #   GCP_PROJECT_ID       : GCP プロジェクト ID
      #   WIF_PROVIDER         : projects/<number>/locations/global/workloadIdentityPools/<pool>/providers/<provider>
      #   WIF_SERVICE_ACCOUNT  : github-actions@<project>.iam.gserviceaccount.com
      #   GOOGLE_CLIENT_ID     : OAuth 2.0 クライアント ID（Cloud Run の環境変数として渡す）
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: 'access_token'

      - uses: docker/login-action@v3
        with:
          registry: asia-northeast1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          allow_unauthenticated: true # IAM 認証はスキップ、アプリ層で Google ID Token 検証
          env_vars: |
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
